<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #controls {
            padding: 20px;
            background: #222;
            display: flex;
            gap: 20px;
        }

        canvas {
            flex: 1;
            display: block;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>

<body>
    <div id="controls">
        <div class="control-group">
            <label>Speed: <span id="speed-val">2.0</span></label>
            <input type="range" id="speed" min="0" max="5" step="0.1" value="2">
        </div>
        <div class="control-group">
            <label>Turn Angle: <span id="turn-val">0.1</span></label>
            <input type="range" id="turn" min="-0.5" max="0.5" step="0.01" value="0.1">
        </div>
    </div>
    <canvas id="c"></canvas>
    <script type="module">
        import { Simulation } from 'https://esm.sh/@websimbench/agentyx@0.1.1?bundle';

        const canvas = document.getElementById('c');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - document.getElementById('controls').offsetHeight;

        const sim = new Simulation({
            canvas,
            source: {
                kind: 'dsl',
                code: `
                    input speed = 2.0;
                    input turnAngle = 0.1;
                    moveForward(inputs.speed);
                    turn(inputs.turnAngle);
                    borderWrapping();
                `
            },
            options: { agents: 5000 }
        });

        const speedSlider = document.getElementById('speed');
        const turnSlider = document.getElementById('turn');

        let speed = 2.0;
        let turnAngle = 0.1;

        speedSlider.addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('speed-val').textContent = speed.toFixed(1);
        });
        turnSlider.addEventListener('input', (e) => {
            turnAngle = parseFloat(e.target.value);
            document.getElementById('turn-val').textContent = turnAngle.toFixed(2);
        });

        (async function tick() {
            // override the inputs defined in DSL dynamically
            await sim.runFrame('JavaScript', { speed, turnAngle }, 'cpu');
            requestAnimationFrame(tick);
        })();
    </script>
</body>

</html>
